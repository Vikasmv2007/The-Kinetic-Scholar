<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DO IT NOW - Mobile UI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    :root {
      --bg-charcoal-1: #111216;
      --bg-charcoal-2: #191b21;
      --glass-fill: rgba(26, 28, 35, 0.44);
      --glass-stroke: rgba(255, 255, 255, 0.16);
      --text-main: #f6f7fb;
      --text-dim: #a8adb9;
      --neon-pink: #ff2f92;
      --neon-green: #64ff57;
      --neon-yellow: #ffd74d;
      --neon-cyan: #31f3ff;
      --neo-border: #fefefe;
      --grain-opacity: 0.09;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #272b36 0%, var(--bg-charcoal-1) 42%, #0d0f13 100%);
      color: var(--text-main);
      font-family: 'Space Grotesk', sans-serif;
    }

    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
      position: relative;
      isolation: isolate;
    }

    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 18% 12%, rgba(255, 47, 146, 0.16), transparent 25%),
        radial-gradient(circle at 84% 20%, rgba(49, 243, 255, 0.14), transparent 28%),
        radial-gradient(circle at 70% 88%, rgba(100, 255, 87, 0.14), transparent 24%);
      filter: blur(28px);
      z-index: -2;
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: var(--grain-opacity);
      z-index: -1;
      background-image:
        repeating-radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.35) 1px, transparent 1px, transparent 3px),
        repeating-radial-gradient(circle at 100% 100%, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7) 1px, transparent 1px, transparent 4px);
      background-size: 7px 7px, 9px 9px;
      mix-blend-mode: soft-light;
      animation: grainShift 240ms steps(8) infinite;
    }

    @keyframes grainShift {
      0% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(1.2%, -1.4%);
      }
      50% {
        transform: translate(-1.6%, 1.1%);
      }
      75% {
        transform: translate(1.1%, 1.4%);
      }
      100% {
        transform: translate(0, 0);
      }
    }

    .phone {
      width: min(95vw, 520px);
      aspect-ratio: 9 / 19.5;
      border-radius: 44px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(164deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.01) 70%),
        linear-gradient(180deg, var(--bg-charcoal-2), #0f1116 35%, #090b10 100%);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.72),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 -40px 80px rgba(0, 0, 0, 0.35);
      padding: 38px 28px 26px;
      animation: reveal 0.85s cubic-bezier(0.16, 0.84, 0.28, 1) both;
    }

    @keyframes reveal {
      from {
        transform: translateY(22px) scale(0.98);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .neo-notch {
      width: 38%;
      height: 30px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 0 0 18px 18px;
      margin: -38px auto 14px;
      background: rgba(8, 10, 14, 0.76);
      backdrop-filter: blur(10px);
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      letter-spacing: 0.09em;
      font-size: clamp(24px, 4.8vw, 30px);
      text-transform: uppercase;
      line-height: 1.16;
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.1),
        0 0 28px rgba(255, 47, 146, 0.28);
      margin-top: 8px;
      margin-bottom: 20px;
    }

    .glass-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .glass {
      position: relative;
      background: var(--glass-fill);
      backdrop-filter: blur(16px) saturate(140%);
      border-radius: 22px;
      padding: 16px;
      border: 1px solid var(--glass-stroke);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      animation: riseIn 0.7s ease both;
    }

    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glass.pink {
      box-shadow:
        0 0 0 1px rgba(255, 47, 146, 0.36),
        0 0 24px rgba(255, 47, 146, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .glass.pink::before {
      background: linear-gradient(130deg, rgba(255, 47, 146, 0.92), rgba(255, 47, 146, 0));
    }

    .glass.green {
      box-shadow:
        0 0 0 1px rgba(100, 255, 87, 0.3),
        0 0 24px rgba(100, 255, 87, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .glass.green::before {
      background: linear-gradient(120deg, rgba(100, 255, 87, 0.88), rgba(100, 255, 87, 0));
    }

    .glass.yellow {
      box-shadow:
        0 0 0 1px rgba(255, 215, 77, 0.36),
        0 0 24px rgba(255, 215, 77, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .glass.yellow::before {
      background: linear-gradient(115deg, rgba(255, 215, 77, 0.86), rgba(255, 215, 77, 0));
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .value {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .progress-wrap {
      width: 122px;
      height: 122px;
      display: grid;
      place-items: center;
      position: relative;
      filter: drop-shadow(0 0 16px rgba(49, 243, 255, 0.34));
    }

    .ring {
      width: 122px;
      height: 122px;
      border-radius: 50%;
      background: conic-gradient(var(--neon-cyan) 0 288deg, rgba(255, 255, 255, 0.09) 288deg 360deg);
      display: grid;
      place-items: center;
      animation: pulse 2.6s ease-in-out infinite;
    }

    .ring::before {
      content: '';
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(8, 12, 18, 0.9);
      border: 1px solid rgba(49, 243, 255, 0.45);
      box-shadow: inset 0 0 20px rgba(49, 243, 255, 0.12);
    }

    .ring-value {
      position: absolute;
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #d6fbff;
      letter-spacing: 0.02em;
      text-shadow: 0 0 16px rgba(49, 243, 255, 0.5);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 14px;
      padding: 11px 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

    .task span {
      font-size: 13px;
      color: #dee2ef;
      letter-spacing: 0.01em;
    }

    .chip {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 5px 9px;
      color: #121212;
      background: linear-gradient(120deg, #f7ff8a, #84ff68);
    }

    .photos-zone {
      margin-top: auto;
      position: relative;
      height: 210px;
    }

    .polaroid {
      position: absolute;
      width: 172px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 4px;
      padding: 8px 8px 24px;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.68);
    }

    .polaroid img {
      width: 100%;
      height: 146px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      filter: saturate(1.2) contrast(1.04);
    }

    .polaroid.left {
      left: 12px;
      bottom: 10px;
      transform: rotate(-10deg);
    }

    .polaroid.right {
      right: 6px;
      bottom: 0;
      transform: rotate(9deg);
    }

    .caption {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 7px;
      font-size: 10px;
      color: #202020;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
    }

    .brand {
      position: absolute;
      bottom: 22px;
      left: 28px;
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 0.16em;
      font-weight: 800;
      color: #f8f9ff;
      text-shadow:
        0 0 22px rgba(255, 47, 146, 0.34),
        0 0 26px rgba(49, 243, 255, 0.2);
    }

    .brand strong {
      color: #fff;
      background: linear-gradient(135deg, var(--neon-pink), #ffe167);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .resolution-note {
      position: absolute;
      bottom: 22px;
      right: 24px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(248, 249, 255, 0.72);
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
    }

    .neo-corner {
      position: absolute;
      width: 52px;
      height: 52px;
      border: 2px solid var(--neo-border);
      opacity: 0.34;
    }

    .neo-corner.top-right {
      top: 16px;
      right: 14px;
      border-left: 0;
      border-bottom: 0;
    }

    .neo-corner.bottom-left {
      left: 14px;
      bottom: 14px;
      border-top: 0;
      border-right: 0;
    }

    @media (max-width: 420px) {
      .phone {
        width: 100%;
        border-radius: 30px;
        padding: 32px 20px 20px;
      }

      .title {
        font-size: clamp(20px, 6vw, 24px);
      }

      .polaroid {
        width: 150px;
      }

      .polaroid img {
        height: 124px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="grain" aria-hidden="true"></div>

    <main class="phone" aria-label="DO IT NOW app mockup, cyber streetwear dark glassmorphism design">
      <div class="neo-notch"></div>
      <div class="neo-corner top-right" aria-hidden="true"></div>
      <div class="neo-corner bottom-left" aria-hidden="true"></div>

      <h1 class="title">WHAT'S THE VIBE TODAY?</h1>

      <section class="glass-grid">
        <article class="glass pink top-card" style="animation-delay: 0.08s">
          <div>
            <p class="label">Current Mission</p>
            <p class="value">DO IT NOW // PUSH MODE</p>
          </div>
          <div class="progress-wrap" aria-label="Progress 80 percent">
            <div class="ring"></div>
            <span class="ring-value">80%</span>
          </div>
        </article>

        <article class="glass green" style="animation-delay: 0.14s">
          <p class="label">Night Stack</p>
          <div class="task-list">
            <div class="task">
              <span>Design sprint draft</span>
              <span class="chip">active</span>
            </div>
            <div class="task">
              <span>Streetwear reel cut</span>
              <span class="chip">queued</span>
            </div>
          </div>
        </article>

        <article class="glass yellow" style="animation-delay: 0.2s">
          <p class="label">Energy Pulse</p>
          <p class="value">NEO BRUTAL RHYTHM // HIGH FOCUS</p>
        </article>
      </section>

      <section class="photos-zone" aria-label="Polaroid photo stack">
        <figure class="polaroid left">
          <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80" alt="Person working on laptop with creative setup" />
          <figcaption class="caption">Late Shift</figcaption>
        </figure>
        <figure class="polaroid right">
          <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=900&q=80" alt="Focused person working at desk" />
          <figcaption class="caption">Build Session</figcaption>
        </figure>
      </section>

      <p class="brand"><strong>DO</strong> IT NOW</p>
      <p class="resolution-note">8K-ready concept</p>
    </main>
  </div>
</body>
</html>
