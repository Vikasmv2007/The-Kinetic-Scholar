</div>
<div class="relative">
<button id="profileBtn" class="w-12 h-12 border-4 border-[#0c0f0f] bg-secondary shadow-[2px_2px_0px_0px_#0c0f0f] flex items-center justify-center hover:translate-x-0.5 hover:translate-y-0.5 transition-transform">

<!-- Profile Dropdown -->

<main class="pt-28 pb-32 px-6 max-w-5xl mx-auto">
<!-- Search Bar Section -->

<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-inverse-surface text-2xl">search</span>
</div>
<input class="w-full h-16 bg-surface-container-lowest border-4 border-inverse-surface pl-14 pr-6 text-xl font-bold placeholder:text-outline focus:ring-0 focus:outline-none focus:bg-tertiary-fixed hard-shadow transition-all duration-75" placeholder="FIND A SUBJECT..." type="text"/>
</div>
</section>
<!-- Target Subjects Header -->
<div class="flex items-center justify-between mb-8">
<h2 class="text-4xl font-black uppercase tracking-tighter bg-primary-container px-4 py-2 border-4 border-inverse-surface inline-block -rotate-1 hard-shadow">
                TARGET SUBJECTS
            </h2>
</div>
<!-- Subjects Grid (Bento Style Layout) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
<div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8" id="targetSubjectsGrid"></div>
<!-- Add New Subject Button (Card-sized) -->

<span class="material-symbols-outlined text-6xl mb-4 group-hover:scale-110 transition-transform">add_circle</span>

</button>
<!-- Secondary Statistics / Quick Info (Asymmetric Element) -->
<div class="bg-inverse-surface text-surface p-6 border-4 border-inverse-surface flex flex-col justify-between">
<div>
<h4 class="text-xl font-black uppercase mb-4 text-primary-container">Library Stats</h4>
<div class="space-y-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary">local_fire_department</span>

</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-tertiary-fixed">menu_book</span>
<span class="font-bold uppercase tracking-widest text-sm">0 ACTIVE MODULES</span>
</div>
</div>
</div>
<div class="mt-8">
<p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50">KINETIC ENGINE v2.4</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-24 bg-[#f6f6f6] dark:bg-[#0c0f0f] border-t-4 border-[#0c0f0f]">
<a class="flex flex-col items-center justify-center text-[#2d2f2f] dark:text-[#f6f6f6] h-full w-full font-['Lexend'] font-bold text-[12px] tracking-widest hover:bg-[#00e3fd] hover:text-[#0c0f0f] snap-center active:scale-95 transition-all" data-nav="dash" href="Dash.html">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span>DASH</span>
</a>
<!-- Assuming PLAN is active for the "Library/Subject" context in this flow -->
<a class="flex flex-col items-center justify-center text-[#2d2f2f] dark:text-[#f6f6f6] h-full w-full font-['Lexend'] font-bold text-[12px] tracking-widest snap-center active:scale-95 transition-all" data-nav="plan" href="Subjects.html">

<span>PLAN</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d2f2f] dark:text-[#f6f6f6] h-full w-full font-['Lexend'] font-bold text-[12px] tracking-widest hover:bg-[#00e3fd] hover:text-[#0c0f0f] snap-center active:scale-95 transition-all" data-nav="focus" href="Timer.html">
<span class="material-symbols-outlined mb-1">timer</span>
<span>FOCUS</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d2f2f] dark:text-[#f6f6f6] h-full w-full font-['Lexend'] font-bold text-[12px] tracking-widest hover:bg-[#00e3fd] hover:text-[#0c0f0f] snap-center active:scale-95 transition-all" data-nav="data" href="Data.html">
<span class="material-symbols-outlined mb-1">analytics</span>
<span>DATA</span>
</a>
</nav>
<script src="nav.js"></script>
<script src="profile.js"></script>
<script>
    (function () {
        const grid = document.getElementById('targetSubjectsGrid');
        const addButton = document.querySelector('button .material-symbols-outlined')?.closest('button');

        function formatDateLabel(value) {
            if (!value) {
                return 'NO DATA YET';
            }
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return 'NO DATA YET';
            }
            return date.toLocaleDateString();
        }

        function renderSubjects(subjects) {
            if (!grid) {
                return;
            }

            const rows = Array.isArray(subjects) ? subjects : [];
            if (!rows.length) {
                grid.innerHTML = `
                    <article class="bg-surface-container border-4 border-inverse-surface p-6 hard-shadow md:col-span-2">
                        <h3 class="text-2xl font-black uppercase leading-tight mb-2">No Subjects Yet</h3>
                        <p class="text-sm font-bold opacity-70 uppercase tracking-widest">Add subjects from your dashboard profile to populate this tab.</p>
                    </article>
                `;
                return;
            }

            grid.innerHTML = '';
            rows.forEach((item, index) => {
                const percent = Math.max(0, Math.min(100, Math.round(Number(item.progress_percent || 0))));
                const hours = Number(item.hours_studied || 0).toFixed(1);
                const card = document.createElement('article');
                card.className = 'bg-surface-container border-4 border-inverse-surface p-6 hard-shadow hard-shadow-hover transition-all duration-75 relative overflow-hidden group';
                card.innerHTML = `
                    <div class="absolute top-0 right-0 p-2 bg-secondary border-b-4 border-l-4 border-inverse-surface text-surface text-xs font-black uppercase tracking-widest">
                        IMP ${item.importance || 5}
                    </div>
                    <div class="mb-4">
                        <h3 class="text-2xl font-black uppercase leading-tight mb-2">${item.subject || 'Subject'}</h3>
                        <p class="text-sm font-bold opacity-70 uppercase tracking-widest">LAST STUDIED: ${formatDateLabel(item.last_studied)}</p>
                    </div>
                    <div class="mb-6 p-4 border-4 border-inverse-surface bg-surface-container-lowest">
                        <p class="text-xs font-black uppercase tracking-widest">Hours Studied</p>
                        <p class="text-3xl font-black">${hours}h</p>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between font-black text-sm uppercase">
                            <span>Progress</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="w-full h-8 border-4 border-inverse-surface bg-surface-container-lowest">
                            <div class="h-full ${index % 2 === 0 ? 'bg-primary-container' : 'bg-tertiary-fixed'} border-r-4 border-inverse-surface" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function loadSubjects() {
            renderSubjects([]);
            try {
                const response = await fetch('/api/insights');
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || 'Unable to load target subjects');
                }
                renderSubjects(payload.subjects || []);
            } catch {
                renderSubjects([]);
            }
        }

        if (addButton) {
            addButton.addEventListener('click', function () {
                window.location.href = 'Dash.html';
            });
        }

        loadSubjects();
    })();
</script>
</body></html>
