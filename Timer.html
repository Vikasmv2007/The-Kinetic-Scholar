<script>
  const timerDisplayLarge = document.getElementById('timerDisplayLarge');
  const toggleTimerBtn = document.getElementById('toggleTimerBtn');
  const toggleTimerLabel = document.getElementById('toggleTimerLabel');
  const toggleTimerIcon = document.getElementById('toggleTimerIcon');
  const finishTimerBtn = document.getElementById('finishTimerBtn');
  const increase1Btn = document.getElementById('increase1Btn');
  const increase5Btn = document.getElementById('increase5Btn');
  const decrease1Btn = document.getElementById('decrease1Btn');
  const decrease5Btn = document.getElementById('decrease5Btn');
  const sessionProgressFill = document.getElementById('sessionProgressFill');
  const sessionProgressText = document.getElementById('sessionProgressText');

  let baseSeconds = 25 * 60;
  let timeLeft = baseSeconds;
  let isRunning = false;
  let timerInterval = null;

  function formatTime(totalSeconds) {
    const mins = Math.floor(totalSeconds / 60);
    const secs = totalSeconds % 60;
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  }

  function renderTimer() {
    timerDisplayLarge.textContent = formatTime(timeLeft);
    const elapsed = baseSeconds - timeLeft;
    const progress = baseSeconds > 0 ? Math.round((elapsed / baseSeconds) * 100) : 0;
    const safeProgress = Math.max(0, Math.min(100, progress));
    sessionProgressFill.style.width = `${100 - safeProgress}%`;
    sessionProgressText.textContent = `Session Progress: ${safeProgress}%`;
  }

  function updateToggleUI() {
    if (isRunning) {
      toggleTimerLabel.textContent = 'Pause';
      toggleTimerIcon.textContent = 'pause';
    } else {
      toggleTimerLabel.textContent = 'Start';
      toggleTimerIcon.textContent = 'play_arrow';
    }
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isRunning = false;
    updateToggleUI();
  }

  function startTimer() {
    if (isRunning) {
      return;
    }
    isRunning = true;
    updateToggleUI();
    timerInterval = setInterval(() => {
      if (timeLeft <= 0) {
        stopTimer();
        return;
      }
      timeLeft -= 1;
      renderTimer();
      if (timeLeft <= 0) {
        stopTimer();
      }
    }, 1000);
  }

  function toggleTimer() {
    if (isRunning) {
      stopTimer();
      return;
    }
    startTimer();
  }

  function finishTimer() {
    stopTimer();
    timeLeft = baseSeconds;
    renderTimer();
  }

  function adjustTime(deltaMinutes) {
    const delta = deltaMinutes * 60;
    baseSeconds = Math.max(60, baseSeconds + delta);
    timeLeft = Math.max(0, timeLeft + delta);
    if (timeLeft > baseSeconds) {
      timeLeft = baseSeconds;
    }
    renderTimer();
  }

  toggleTimerBtn.addEventListener('click', toggleTimer);
  finishTimerBtn.addEventListener('click', finishTimer);
  increase1Btn.addEventListener('click', () => adjustTime(1));
  increase5Btn.addEventListener('click', () => adjustTime(5));
  decrease1Btn.addEventListener('click', () => adjustTime(-1));
  decrease5Btn.addEventListener('click', () => adjustTime(-5));

  // Music button - open YouTube lofi
  const musicBtn = document.getElementById('musicBtn');
  if (musicBtn) {
    musicBtn.addEventListener('click', () => {
      window.open('https://www.youtube.com/watch?v=jfKfPfyJRdk', '_blank');
    });
  }

  updateToggleUI();
  renderTimer();
</script>
